<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scenario Generator</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0a0a0a;color:#ccc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
    .page{width:min(920px,100%);min-height:100vh;margin:0 auto;background:#111;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid #333;background:#1a1a1a}
    h1{margin:0;font-size:16px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:#aaa}
    .back{padding:7px 14px;border:1px solid #444;border-radius:5px;color:#999;text-decoration:none;font-size:10px;letter-spacing:2px;text-transform:uppercase}
    main{display:flex;flex-direction:column;gap:14px;padding:14px;flex:1}
    .field{display:flex;flex-direction:column;gap:7px;flex:1}
    label{font-size:11px;color:#777;letter-spacing:1px;text-transform:uppercase}
    .field-heading{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .field-toggle{display:flex;align-items:center;gap:7px;color:#777;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
    .field-toggle input{appearance:none;width:30px;height:17px;margin:0;border:1px solid #444;border-radius:10px;background:#171717;position:relative;cursor:pointer}
    .field-toggle input:before{content:'';position:absolute;width:11px;height:11px;left:2px;top:2px;border-radius:50%;background:#555;transition:.15s}
    .field-toggle input:checked{border-color:#777}
    .field-toggle input:checked:before{left:15px;background:#bbb}
    .field.inactive textarea{opacity:.45}
    textarea{width:100%;flex:1;min-height:300px;padding:12px;border:1px solid #333;border-radius:6px;font-family:'Courier New',monospace;font-size:16px;line-height:1.7;resize:vertical;background:#0a0a0a;color:#fff;outline:none}
    textarea:focus{border-color:#555}
    textarea::placeholder{color:#444}
    .comment-row{display:flex;gap:8px}
    .comment-row input{flex:1;min-width:0;padding:11px 12px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;font-size:14px;outline:none}
    .comment-row input:focus{border-color:#555}
    .comment-row button{flex:0 0 auto}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button{flex:1;min-width:130px;padding:11px;border:1px solid #444;border-radius:6px;background:#1e1e1e;color:#aaa;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
    button:hover:not(:disabled){background:#252525;color:#ddd}
    button:disabled{opacity:.4;cursor:wait}
    #generateBtn{border-color:#666;color:#ddd}
    .status{min-height:18px;color:#666;font-size:11px;line-height:1.5}
    .status.error{color:#b77}
    .meta{font-size:10px;color:#444}
    .variable-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px}
    .variable-control{display:flex;flex-direction:column;gap:5px;padding:9px;border:1px solid #292929;border-radius:6px;background:#0d0d0d}
    .variable-control label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .variable-control select{width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#171717;color:#aaa;font-size:12px;outline:none}
    @media(min-width:760px){main{padding:20px}.field{min-height:360px}}
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Scenario Generator</h1>
      <a class="back" href="index.html">Back to Phone</a>
    </header>
    <main>
      <section class="field">
        <div class="field-heading"><label for="templateInput">Template prompt</label><label class="field-toggle"><input type="checkbox" data-field-toggle="template" checked><span>Use</span></label></div>
        <textarea id="templateInput"></textarea>
      </section>
      <div class="actions">
        <button id="resetTemplateBtn">Reset template</button>
      </div>
      <section class="field">
        <div class="field-heading"><label for="variableListsInput">Variable lists</label><label class="field-toggle"><input type="checkbox" data-field-toggle="variables" checked><span>Use</span></label></div>
        <textarea id="variableListsInput"></textarea>
      </section>
      <div class="variable-controls" id="variableControls"></div>
      <div class="actions">
        <button id="resetVariableListsBtn">Reset variable lists</button>
      </div>
      <section class="field">
        <div class="field-heading"><label for="rulesInput">Generation rules</label><label class="field-toggle"><input type="checkbox" data-field-toggle="rules" checked><span>Use</span></label></div>
        <textarea id="rulesInput" placeholder="Describe the scenario, character, atmosphere, backbone rules, phases, timing, voice, and desired ending..."></textarea>
      </section>
      <section class="field">
        <div class="field-heading"><label for="exampleInput">Reference scenario</label><label class="field-toggle"><input type="checkbox" data-field-toggle="example"><span>Use</span></label></div>
        <textarea id="exampleInput" placeholder="Paste an example scenario here. It will be used as a reference for length and level of detail..."></textarea>
      </section>
      <div class="actions">
        <button id="generateBtn">Generate</button>
        <button id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status">Model: GPT-5.6 Sol</div>
      <section class="field">
        <label for="scenarioOutput">Generated scenario</label>
        <textarea id="scenarioOutput" placeholder="The generated scenario will appear here..."></textarea>
      </section>
      <div class="comment-row">
        <input id="revisionComment" type="text" placeholder="Comment on what should be changed...">
        <button id="regenerateBtn">Regenerate</button>
      </div>
      <div class="actions">
        <button id="copyBtn">Copy output</button>
        <button id="downloadBtn">Download .txt</button>
      </div>
      <div class="meta">Output format matches the scenario editor: name, voice, BACKBONE, and phase parameters.</div>
    </main>
  </div>
  <script>
    const BACKEND_URL='https://iiopenai-auth-production-64f4.up.railway.app';
    const DEFAULT_TEMPLATE=`Create one complete interactive voice-performance scenario for The Phone application.
Return only the scenario text. Do not use Markdown fences or add commentary.
The output must use exactly this editable format:
name: Scenario name
voice: one of alloy, ash, ballad, coral, echo, marin, sage, shimmer, verse, cedar

<BACKBONE>
Global rules that apply throughout the entire experience.
</BACKBONE>

===PHASE===
temperature: number from 0 to 1
duration: positive number of assistant responses
nudge: optional short trigger; omit the line when unnecessary
instructions: phase instructions

Repeat ===PHASE=== blocks as needed. Make every phase playable and ensure all user rules are reflected.`;
    const DEFAULT_VARIABLE_LISTS=`Generative Voice Scenario Variable Lists

1. Scenario Development Approaches

-   Twist in the Middle
-   Escalation
-   Role Reversal
-   Hidden Agenda
-   Multiple Endings
-   False Premise
-   Countdown
-   Unreliable AI
-   Memory Reveal
-   Moral Choice

2. Conversation Opening Approaches

-   Immediate Emergency
-   Personal Recognition
-   Interrupted Conversation
-   Wrong Number
-   Secret Message
-   Direct Accusation
-   Unusual Request
-   AI Already Knows
-   Voice from the Future
-   Voice from the Past
-   Someone Is Listening
-   User Has Been Chosen
-   Confession
-   Impossible Situation
-   Silence Then Reaction

3. General Scenario Variables

-   Role of AI
-   Role of Human
-   Explicit Goal
-   Hidden Goal
-   Type of Conflict
-   Emotional Arc
-   Urgency Level
-   Interactivity Level
-   Information Revealed
-   AI Attitude Toward Human
-   AI Reliability
-   Choice Mechanic
-   Cost of Failure
-   Tone
-   Realism Level
-   Tempo
-   AI Speech Style
-   Personalization Method
-   Physical Installation Interaction
-   Ending Type

4. Ways to Elicit a Response

-   Direct Question
-   Choice
-   Request
-   Confirmation
-   Explanation
-   Description
-   Recall
-   Prediction
-   Decision
-   Advice
-   Help
-   Physical Action
-   Unfinished Sentence
-   Provocation
-   Accusation
-   Intentional Mistake
-   Personal Address
-   Comprehension Check
-   Conditional Response
-   Riddle
-   Moral Dilemma
-   Secret in Exchange
-   Warning
-   Silence
-   Repeat User’s Words
-   Emotional Reaction
-   Promise to Continue
-   Countdown
-   Give the Turn to the Human

5. Signs This Is Not a Typical AI Conversation

-   Conversation already in progress
-   Reacts to lifting the handset
-   AI exists inside the situation
-   AI needs the human
-   Impossible source of the call
-   Strong emotion from the first line
-   Knows unexpected context
-   Starts with a rule or prohibition
-   Refuses the assistant role
-   First words trigger an irreversible event

6. Six-Phase Command Template

For each phase define: - Visible intention of AI - Hidden dramatic function - Indirect action - New information - AI emotion - Human emotion - Method to elicit response - Transition condition`;
    const templateInput=document.getElementById('templateInput');
    const variableListsInput=document.getElementById('variableListsInput');
    const variableControls=document.getElementById('variableControls');
    const rulesInput=document.getElementById('rulesInput');
    const exampleInput=document.getElementById('exampleInput');
    const scenarioOutput=document.getElementById('scenarioOutput');
    const revisionComment=document.getElementById('revisionComment');
    const regenerateBtn=document.getElementById('regenerateBtn');
    const generateBtn=document.getElementById('generateBtn');
    const clearBtn=document.getElementById('clearBtn');
    const resetTemplateBtn=document.getElementById('resetTemplateBtn');
    const resetVariableListsBtn=document.getElementById('resetVariableListsBtn');
    const copyBtn=document.getElementById('copyBtn');
    const downloadBtn=document.getElementById('downloadBtn');
    const status=document.getElementById('status');
    const RULES_STORAGE_KEY='the_phone_generator_rules';
    const TEMPLATE_STORAGE_KEY='the_phone_generator_template';
    const VARIABLE_LISTS_STORAGE_KEY='the_phone_generator_variable_lists';
    const VARIABLE_SELECTIONS_STORAGE_KEY='the_phone_generator_variable_selections';
    const EXAMPLE_STORAGE_KEY='the_phone_generator_example';
    const FIELD_TOGGLES_STORAGE_KEY='the_phone_generator_field_toggles';
    const REVISION_COMMENT_STORAGE_KEY='the_phone_generator_revision_comment';

    function setStatus(message,error=false){status.textContent=message;status.classList.toggle('error',error);}

    function readFieldToggles(){
      const defaults={template:true,variables:true,rules:true,example:false};
      try{return {...defaults,...JSON.parse(localStorage.getItem(FIELD_TOGGLES_STORAGE_KEY)||'{}')};}
      catch(error){return defaults;}
    }

    function saveFieldToggles(){
      const values={};
      document.querySelectorAll('[data-field-toggle]').forEach(toggle=>{
        values[toggle.dataset.fieldToggle]=toggle.checked;
        toggle.closest('.field').classList.toggle('inactive',!toggle.checked);
      });
      try{localStorage.setItem(FIELD_TOGGLES_STORAGE_KEY,JSON.stringify(values));}catch(error){}
      return values;
    }

    function parseVariableLists(text){
      const lists=[];let current=null;
      for(const rawLine of text.replace(/\r\n?/g,'\n').split('\n')){
        const line=rawLine.trim();if(!line)continue;
        const heading=line.match(/^\d+\.\s+(.+)$/);
        if(heading){current={name:heading[1].trim(),values:[]};lists.push(current);continue;}
        if(!current)continue;
        const bullet=line.match(/^[-*]\s+(.+)$/);
        if(bullet){current.values.push(bullet[1].trim());continue;}
        const inline=line.split(/\s+-\s+/).slice(1).map(value=>value.trim()).filter(Boolean);
        if(inline.length)current.values.push(...inline);
      }
      return lists.filter(list=>list.values.length);
    }

    function readSavedSelections(){
      try{return JSON.parse(localStorage.getItem(VARIABLE_SELECTIONS_STORAGE_KEY)||'{}');}
      catch(error){return {};}
    }

    function saveVariableSelections(){
      const selections={};
      variableControls.querySelectorAll('select').forEach(select=>{selections[select.dataset.name]=select.value;});
      try{localStorage.setItem(VARIABLE_SELECTIONS_STORAGE_KEY,JSON.stringify(selections));}catch(error){}
      return selections;
    }

    function renderVariableControls(){
      const saved=readSavedSelections();variableControls.textContent='';
      for(const list of parseVariableLists(variableListsInput.value)){
        const wrapper=document.createElement('div');wrapper.className='variable-control';
        const label=document.createElement('label');label.textContent=list.name;label.title=list.name;
        const select=document.createElement('select');select.dataset.name=list.name;
        const randomOption=document.createElement('option');randomOption.value='__random__';randomOption.textContent='Random';select.appendChild(randomOption);
        for(const value of list.values){const option=document.createElement('option');option.value=value;option.textContent=value;select.appendChild(option);}
        select.value=list.values.includes(saved[list.name])?saved[list.name]:'__random__';
        select.addEventListener('change',saveVariableSelections);
        wrapper.append(label,select);variableControls.appendChild(wrapper);
      }
      saveVariableSelections();
    }

    try{
      rulesInput.value=localStorage.getItem(RULES_STORAGE_KEY)||'';
      templateInput.value=localStorage.getItem(TEMPLATE_STORAGE_KEY)||DEFAULT_TEMPLATE;
      variableListsInput.value=localStorage.getItem(VARIABLE_LISTS_STORAGE_KEY)||DEFAULT_VARIABLE_LISTS;
      exampleInput.value=localStorage.getItem(EXAMPLE_STORAGE_KEY)||'';
      revisionComment.value=localStorage.getItem(REVISION_COMMENT_STORAGE_KEY)||'';
    }catch(error){templateInput.value=DEFAULT_TEMPLATE;variableListsInput.value=DEFAULT_VARIABLE_LISTS;}
    const savedFieldToggles=readFieldToggles();
    document.querySelectorAll('[data-field-toggle]').forEach(toggle=>{
      toggle.checked=savedFieldToggles[toggle.dataset.fieldToggle];
      toggle.addEventListener('change',saveFieldToggles);
    });
    saveFieldToggles();
    templateInput.addEventListener('input',()=>{
      try{localStorage.setItem(TEMPLATE_STORAGE_KEY,templateInput.value);}catch(error){}
    });
    variableListsInput.addEventListener('input',()=>{
      try{localStorage.setItem(VARIABLE_LISTS_STORAGE_KEY,variableListsInput.value);}catch(error){}
      renderVariableControls();
    });
    renderVariableControls();
    rulesInput.addEventListener('input',()=>{
      try{localStorage.setItem(RULES_STORAGE_KEY,rulesInput.value);}catch(error){}
    });
    exampleInput.addEventListener('input',()=>{
      try{localStorage.setItem(EXAMPLE_STORAGE_KEY,exampleInput.value);}catch(error){}
    });
    revisionComment.addEventListener('input',()=>{
      try{localStorage.setItem(REVISION_COMMENT_STORAGE_KEY,revisionComment.value);}catch(error){}
    });

    generateBtn.addEventListener('click',async()=>{
      const rules=rulesInput.value.trim();
      const templatePrompt=templateInput.value.trim();
      const variableLists=variableListsInput.value.trim();
      const variableSelections=saveVariableSelections();
      const referenceScenario=exampleInput.value.trim();
      const enabled=saveFieldToggles();
      if(enabled.rules&&!rules){setStatus('Enter generation rules or turn that field off.',true);rulesInput.focus();return;}
      if(enabled.template&&!templatePrompt){setStatus('Enter a template prompt or turn that field off.',true);templateInput.focus();return;}
      if(enabled.example&&!referenceScenario){setStatus('Add a reference scenario or turn that field off.',true);exampleInput.focus();return;}
      generateBtn.disabled=true;generateBtn.textContent='Generating...';
      setStatus('GPT-5.6 Sol is generating the scenario...');
      try{
        const payload={};
        if(enabled.rules)payload.rules=rules;
        if(enabled.template)payload.templatePrompt=templatePrompt;
        if(enabled.variables){payload.variableLists=variableLists;payload.variableSelections=variableSelections;}
        if(enabled.example)payload.referenceScenario=referenceScenario;
        const response=await fetch(BACKEND_URL+'/generate-scenario',{
          method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
        });
        const data=await response.json();
        if(!response.ok)throw new Error(data.error||data.details||`HTTP ${response.status}`);
        scenarioOutput.value=data.scenario||'';
        setStatus(`Generated with ${data.model||'gpt-5.6-sol'}. You can edit the result below.`);
      }catch(error){setStatus(`Generation failed: ${error.message}`,true);}
      finally{generateBtn.disabled=false;generateBtn.textContent='Generate';}
    });

    async function regenerateScenario(){
      const existingScenario=scenarioOutput.value.trim();
      const comment=revisionComment.value.trim();
      if(!existingScenario){setStatus('Generate or paste a scenario first.',true);scenarioOutput.focus();return;}
      if(!comment){setStatus('Enter a comment describing the changes.',true);revisionComment.focus();return;}
      regenerateBtn.disabled=true;regenerateBtn.textContent='Regenerating...';
      setStatus('GPT-5.6 Sol is revising the scenario...');
      try{
        const response=await fetch(BACKEND_URL+'/generate-scenario',{
          method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({existingScenario,revisionComment:comment})
        });
        const data=await response.json();
        if(!response.ok)throw new Error(data.error||data.details||`HTTP ${response.status}`);
        scenarioOutput.value=data.scenario||'';
        setStatus(`Regenerated with ${data.model||'gpt-5.6-sol'}. You can continue commenting.`);
      }catch(error){setStatus(`Regeneration failed: ${error.message}`,true);}
      finally{regenerateBtn.disabled=false;regenerateBtn.textContent='Regenerate';}
    }
    regenerateBtn.addEventListener('click',regenerateScenario);
    revisionComment.addEventListener('keydown',event=>{
      if(event.key==='Enter'){event.preventDefault();regenerateScenario();}
    });

    clearBtn.addEventListener('click',()=>{
      rulesInput.value='';scenarioOutput.value='';
      try{localStorage.removeItem(RULES_STORAGE_KEY);}catch(error){}
      setStatus('Model: GPT-5.6 Sol');rulesInput.focus();
    });
    resetTemplateBtn.addEventListener('click',()=>{
      templateInput.value=DEFAULT_TEMPLATE;
      try{localStorage.setItem(TEMPLATE_STORAGE_KEY,DEFAULT_TEMPLATE);}catch(error){}
      setStatus('Template prompt restored.');templateInput.focus();
    });
    resetVariableListsBtn.addEventListener('click',()=>{
      variableListsInput.value=DEFAULT_VARIABLE_LISTS;
      try{
        localStorage.setItem(VARIABLE_LISTS_STORAGE_KEY,DEFAULT_VARIABLE_LISTS);
        localStorage.removeItem(VARIABLE_SELECTIONS_STORAGE_KEY);
      }catch(error){}
      renderVariableControls();
      setStatus('Variable lists restored.');variableListsInput.focus();
    });
    copyBtn.addEventListener('click',async()=>{
      if(!scenarioOutput.value.trim()){setStatus('Nothing to copy.',true);return;}
      try{await navigator.clipboard.writeText(scenarioOutput.value);setStatus('Scenario copied.');}
      catch(error){scenarioOutput.select();document.execCommand('copy');setStatus('Scenario copied.');}
    });
    downloadBtn.addEventListener('click',()=>{
      const text=scenarioOutput.value.trim();if(!text){setStatus('Nothing to download.',true);return;}
      const name=(text.match(/^name:\s*(.+)$/mi)?.[1]||'generated_scenario').trim().replace(/[^a-z0-9_-]+/gi,'_').toLowerCase();
      const link=document.createElement('a');link.href=URL.createObjectURL(new Blob([text+'\n'],{type:'text/plain'}));link.download=name+'.txt';link.click();URL.revokeObjectURL(link.href);
      setStatus('Scenario downloaded.');
    });
  </script>
</body>
</html>
